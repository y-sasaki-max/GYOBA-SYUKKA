<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>受注・出荷管理システム</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/select2-bootstrap-5-theme@1.3.0/dist/select2-bootstrap-5-theme.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { background-color: #f8f9fa; font-family: "Helvetica Neue", Arial, sans-serif; }
        .navbar { background-color: #fff; border-bottom: 1px solid #dee2e6; }
        .page { display: none; }
        .page.active { display: block; }

        /* ★変更：画面全体を覆うローディングを廃止し、左下の小さな通知に変更 */
        .loading-spinner {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            width: auto;
            height: auto;
            background: rgba(255, 255, 255, 0.95); 
            z-index: 9999;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 12px 24px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
            border: 1px solid #dee2e6;
            pointer-events: none; /* マウス操作を貫通させる（裏のボタンを押せる） */
        }
        .loading-text { margin-top: 0; margin-left: 12px; font-weight: bold; color: #0d6efd; font-size: 1rem; }
        .spinner-border { width: 1.5rem; height: 1.5rem; border-width: 0.2em; }
        
        .alert-customer-item { transition: background-color 0.2s; }
        .alert-customer-item:hover { background-color: #fff3cd; }
        
        .ship-price { width: 90px !important; } 
        .print-check-wrapper { transform: scale(1.3); margin-right: 15px; }
        
        .ship-product-select-container { 
            width: 220px; 
            min-width: 200px; 
            transition: width 0.3s ease; 
        }
        .ship-product-select-container:focus-within {
            width: 350px; 
        }

        .ship-standard { 
            min-width: 100px; 
            transition: min-width 0.3s ease; 
        }
        .ship-standard:focus {
            min-width: 250px; 
            position: relative;
            z-index: 10;
        }

        .ship-unit { min-width: 70px; }
        .ship-rem { min-width: 80px; }
        .select2-results__option { border-bottom: 1px solid #f0f0f0; padding-top: 6px; padding-bottom: 6px; }
        
        .awase-badge { 
            font-size: 0.7rem; 
            padding: 2px 5px; 
            border-radius: 4px; 
            margin-left: 5px; 
            cursor: help;
            white-space: nowrap; 
            display: inline-block;
            vertical-align: middle;
        }

        .select2-container--bootstrap-5 .select2-selection--single { height: 31px; padding-top: 2px; font-size: 0.875rem; }
        input[type="date"] { min-width: 130px; }

        .row-dimmed {
            background-color: #f0f0f0 !important;
            color: #aaa !important;
        }
        .row-dimmed input, .row-dimmed select {
            background-color: #f9f9f9 !important;
            color: #aaa !important;
            border-color: #ddd !important;
        }

        #toast-container {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 10000;
        }
    </style>
</head>
<body>

    <div class="loading-spinner" id="loading-spinner">
        <div class="spinner-border text-primary" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <div class="loading-text">通信中...</div>
    </div>

    <div id="toast-container"></div>

    <nav class="navbar navbar-expand-lg navbar-light bg-light sticky-top shadow-sm">
        <div class="container-fluid">
            <a class="navbar-brand" href="#"><i class="bi bi-box-seam-fill me-2 text-primary"></i>受注＆出荷登録システム</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('dashboard')">ダッシュボード</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('shipping-page')">出荷登録</a></li>
                    <li class="nav-item"><a class="nav-link" href="#" onclick="showPage('export-page')">データ管理</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid p-4">
        <div id="dashboard" class="page">
            <h3 class="mb-4 border-bottom pb-2">ダッシュボード</h3>
            <div class="row g-3 mb-4">
                <div class="col-md-3"><div class="card text-center h-100 border-primary"><div class="card-body"><h6 class="text-muted">本日の注文件数</h6><p class="display-6 fw-bold text-primary" id="db-total-orders">0</p></div></div></div>
                <div class="col-md-3"><div class="card text-center h-100 bg-success text-white"><div class="card-body"><h6>確定済み</h6><p class="display-6 fw-bold" id="db-confirmed-orders">0</p></div></div></div>
                <div class="col-md-3"><div class="card text-center h-100 bg-warning text-dark"><div class="card-body"><h6>未確定</h6><p class="display-6 fw-bold" id="db-pending-orders">0</p></div></div></div>
                <div class="col-md-3"><div class="card text-center h-100 border-info"><div class="card-body"><h6 class="text-muted">本日の売上予測</h6><p class="display-6 fw-bold text-info" id="db-total-sales">¥0</p></div></div></div>
            </div>
            <div class="row"><div class="col-12"><div class="card border-warning"><div class="card-header bg-warning text-dark fw-bold"><i class="bi bi-exclamation-triangle-fill me-2"></i>未注文のアラート</div><div class="card-body p-0"><div id="alert-customer-list" class="list-group list-group-flush alert-customer-list"></div></div></div></div></div>
        </div>

        <div id="shipping-page" class="page">
            <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-2">
                <h3>出荷登録</h3>
                <div>
                    <button class="btn btn-warning btn-sm me-2" onclick="window.open('https://docs.google.com/spreadsheets/d/1GnhQRHvBZ7yL-cgHeaCNDCt8OtM-m09zI060vxw03K8/edit?pli=1&gid=423721715#gid=423721715', '_blank')">
                        <i class="bi bi-list-check"></i> 出荷指示書を開く
                    </button>
                    <button class="btn btn-outline-primary btn-sm" onclick="loadShippingData()"><i class="bi bi-arrow-clockwise"></i> 更新</button>
                </div>
            </div>

            <div class="mb-2">
                <div class="btn-group w-100" role="group" id="date-filter-group"></div>
            </div>

            <div class="row mb-2">
                <div class="col-md-6">
                    <label class="small text-muted fw-bold">商品区分:</label>
                    <div class="btn-group w-100" role="group">
                        <button type="button" class="btn btn-outline-dark active" onclick="setTempFilter(this, 'all')">すべて</button>
                        <button type="button" class="btn btn-outline-info" onclick="setTempFilter(this, 'chilled')">❄️ チルド</button>
                        <button type="button" class="btn btn-outline-primary" onclick="setTempFilter(this, 'frozen')">🧊 冷凍</button>
                    </div>
                </div>
                <div class="col-md-6">
                    <label class="small text-muted fw-bold">ステータス:</label>
                    <div class="btn-group w-100" role="group">
                        <button type="button" class="btn btn-outline-secondary active" onclick="setStatusFilter(this, 'all')">すべて</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="setStatusFilter(this, 'unconfirmed')">未確定</button>
                        <button type="button" class="btn btn-outline-secondary" onclick="setStatusFilter(this, 'confirmed')">確定済み</button>
                    </div>
                </div>
            </div>
            
            <div class="d-flex justify-content-end mb-2 bg-light p-2 rounded border" id="batch-action-area" style="display:none;">
                <div class="d-flex align-items-center">
                    <span class="me-3 fw-bold"><span id="selected-count">0</span> 件選択中</span>
                    <button class="btn btn-danger" onclick="generateBatchPdfs()">
                        <i class="bi bi-file-earmark-pdf-fill"></i> 送り状・納品書発行
                    </button>
                </div>
            </div>

            <div class="accordion" id="shipping-orders-accordion"></div>
        </div>

        <div id="export-page" class="page">
            <h3 class="mb-4 border-bottom pb-2">データ管理</h3>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="card h-100">
                        <div class="card-header fw-bold bg-light"><i class="bi bi-download me-2"></i>日次売上CSV出力</div>
                        <div class="card-body">
                            <form onsubmit="event.preventDefault(); exportDailyCsv();" class="row g-3">
                                <div class="col-12">
                                    <label class="form-label">売上日（注文日）</label>
                                    <input type="date" id="export-target-date" class="form-control" required>
                                </div>
                                <div class="col-12 mt-4">
                                    <button type="submit" class="btn btn-success w-100">
                                        <i class="bi bi-file-earmark-spreadsheet"></i> CSVエクスポート
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="card h-100 border-primary">
                        <div class="card-header fw-bold bg-primary text-white"><i class="bi bi-upload me-2"></i>納入先台帳の取込</div>
                        <div class="card-body">
                            <p class="small text-muted mb-3">CSVファイルを選択してください。<br><strong>納入先コード(1列目)</strong>が一致する場合は上書き、<br>存在しない場合は新規追加されます。（取り込み対象：先頭6列）</p>
                            <form onsubmit="event.preventDefault(); importCsv();">
                                <div class="mb-3"><input class="form-control" type="file" id="import-file" accept=".csv" required></div>
                                <button type="submit" class="btn btn-primary w-100"><i class="bi bi-cloud-upload"></i> インポート実行</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div class="modal fade" id="stockModal" tabindex="-1">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 class="modal-title"><i class="bi bi-box2 me-2"></i>在庫引当</h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
          </div>
          <div class="modal-body">
            <div class="table-responsive">
              <table class="table table-sm table-hover align-middle">
                <thead class="table-light">
                  <tr>
                    <th>倉庫名</th>
                    <th>ロット番号</th>
                    <th>賞味期限</th>
                    <th class="text-end">在庫数量</th>
                    <th>単位</th>
                    <th>操作</th>
                  </tr>
                </thead>
                <tbody id="stock-modal-tbody">
                  </tbody>
              </table>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        let allProductsCache = [];
        let allCustomersCache = [];
        let allCarriersCache = [];
        let allDeliveryDestinationsCache = [];
        let allUnitMasterCache = [];
        let select2Data = [];
        let defaultShipDate = '';
        let defaultDeliveryDate = ''; 
        let currentOrders = [];
        let currentTempFilter = 'all';
        let currentStatusFilter = 'all';
        let currentDateFilter = ''; 
        let currentCustomerPrices = {};

        // 丸め関数（小数点第1位を残す四捨五入）
        function round1st(x) {
            return Math.round(x * 10) / 10;
        }

        // 単位コード → 単位名
        function getUnitName(code) {
            const u = allUnitMasterCache.find(u => String(u.code) === String(code));
            return u ? u.name : String(code);
        }
        // 単位名 → 単位コード
        function getUnitCode(name) {
            const u = allUnitMasterCache.find(u => u.name === String(name));
            return u ? String(u.code) : String(name);
        }

        window.onload = () => {
            showPage('dashboard');
            
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('export-target-date').value = today;

            callGAS('getAllUnitMaster').then(units => { allUnitMasterCache = units || []; });

            callGAS('getInitialDates').then(dates => {
                defaultShipDate = dates.shipDate;
                defaultDeliveryDate = dates.deliveryDate;
            }).catch(e => {
                let d1 = new Date(); d1.setDate(d1.getDate() + 1);
                let d2 = new Date(); d2.setDate(d2.getDate() + 2);
                defaultShipDate = d1.toISOString().split('T')[0];
                defaultDeliveryDate = d2.toISOString().split('T')[0];
            });

            initDateFilters();
        };

        function initDateFilters() {
            const container = document.getElementById('date-filter-group');
            container.innerHTML = '';
            const today = new Date();
            
            for(let i=0; i<3; i++) {
                const d = new Date();
                d.setDate(today.getDate() + i);
                const val = d.getFullYear() + '-' + ('0' + (d.getMonth() + 1)).slice(-2) + '-' + ('0' + d.getDate()).slice(-2);
                const label = (i === 0) ? '今日' : (i === 1) ? '明日' : '明後日';
                
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = (i === 0) ? 'btn btn-outline-primary active' : 'btn btn-outline-primary';
                btn.textContent = `${label} (${d.getMonth()+1}/${d.getDate()})`;
                btn.onclick = () => setDateFilter(btn, val);
                
                container.appendChild(btn);
                if (i === 0) currentDateFilter = val; 
            }
        }

        function showLoading(show) { 
            const spinner = document.getElementById('loading-spinner');
            spinner.style.display = show ? 'flex' : 'none';
        }

        function showToast(message, type = 'info') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast align-items-center text-white bg-${type === 'error' ? 'danger' : 'primary'} border-0 show`;
            toast.role = 'alert';
            toast.innerHTML = `
                <div class="d-flex">
                    <div class="toast-body">${message}</div>
                    <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                </div>
            `;
            container.appendChild(toast);
            setTimeout(() => toast.remove(), 5000); 
        }
        
        async function callGAS(func, ...args) {
            return new Promise((resolve, reject) => google.script.run.withSuccessHandler(resolve).withFailureHandler(reject)[func](...args));
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const navLink = document.querySelector(`.nav-link[onclick="showPage('${pageId}')"]`);
            if(navLink) navLink.classList.add('active');
            if (pageId === 'dashboard') loadDashboardData();
            if (pageId === 'shipping-page') loadShippingData();
        }

        function formatProductOption(state) {
            if (!state.id) return state.text;
            const p = state; 
            const standardText = p.standard ? `<div class="small text-muted ms-2"><i class="bi bi-tag-fill me-1"></i>${p.standard}</div>` : '';
            return $(`<div class="lh-sm"><div class="fw-bold text-dark">${p.id}: ${p.text || p.name}</div>${standardText}</div>`);
        }
        function formatProductSelection(state) {
            if (!state.id) return state.text;
            return state.text || state.name; 
        }
        function matchCustomProduct(params, data) {
            if ($.trim(params.term) === '') return data;
            if (!data.id) return null;
            const term = params.term.toLowerCase();
            const id = (String(data.id) || '').toLowerCase(); 
            const text = (data.text || data.name || '').toLowerCase();
            const kana = (data.kana || '').toLowerCase();
            const brand = (data.brand || '').toLowerCase();
            const standard = (data.standard || '').toLowerCase();
            if (id.indexOf(term) > -1 || text.indexOf(term) > -1 || kana.indexOf(term) > -1 || brand.indexOf(term) > -1 || standard.indexOf(term) > -1) return data;
            return null;
        }

        async function loadDashboardData() {
            showLoading(true);
            try {
                const data = await callGAS('getDashboardData');
                document.getElementById('db-total-orders').textContent = data.total;
                document.getElementById('db-confirmed-orders').textContent = data.confirmed;
                document.getElementById('db-pending-orders').textContent = data.pending;
                document.getElementById('db-total-sales').textContent = `¥${data.sales.toLocaleString()}`;
                const alertList = document.getElementById('alert-customer-list');
                alertList.innerHTML = '';
                if (data.alertCustomers.length > 0) {
                    data.alertCustomers.forEach(c => {
                        const item = document.createElement('div');
                        item.className = 'list-group-item alert-customer-item d-flex justify-content-between align-items-center';
                        item.innerHTML = `<div><span class="fw-bold">${c.name}</span><span class="small text-muted ms-2">最終注文: ${c.lastDate}</span></div>`;
                        alertList.appendChild(item);
                    });
                } else { alertList.innerHTML = '<div class="list-group-item text-muted text-center">アラート対象なし</div>'; }
            } catch (e) { console.error(e); } finally { showLoading(false); }
        }

        async function loadShippingData() {
            showLoading(true);
            const container = document.getElementById('shipping-orders-accordion');
            container.innerHTML = '';
            
            try {
                if(allCustomersCache.length === 0 || allProductsCache.length === 0 || allCarriersCache.length === 0) {
                   const [c, p, cr, d] = await Promise.all([callGAS('getAllCustomers'), callGAS('getAllProducts'), callGAS('getAllCarriers'), callGAS('getAllDeliveryDestinations')]);
                   allCustomersCache = c;
                   allProductsCache = p;
                   allCarriersCache = cr;
                   allDeliveryDestinationsCache = d;
                   select2Data = p.map(pd => ({ id: pd.id, text: pd.name, ...pd }));
                }

                const orders = await callGAS('getRecentOrders'); 
                currentOrders = orders; 

                if (orders.length === 0) { container.innerHTML = '<div class="alert alert-info">直近の注文はありません</div>'; return; }

                orders.forEach((o, i) => {
                    const isConfirmed = o.status === '確定済み';
                    const badge = isConfirmed ? '<span class="badge bg-success">確定済み</span>' : '<span class="badge bg-warning text-dark">未確定</span>';
                    const printedBadge = o.isPrinted ? '<span class="badge bg-info text-white ms-2">出力済</span>' : '';
                    
                    const shipBadge = `<span class="badge bg-secondary me-2"><i class="bi bi-truck"></i> ${o.shipDateGroup} 出荷分</span>`;
                    
                    const createRows = (items) => items.map(item => {
                        let awaseBadge = '';
                        let awaseChecked = '';
                        if (item.awaseId && item.awaseId.startsWith('G-')) {
                            const color = stringToColor(item.awaseId);
                            awaseBadge = `<span class="awase-badge" style="background-color:${color};color:#fff" title="${item.awaseId}">同梱</span>`;
                        } else if (item.isAwase) {
                            awaseChecked = 'checked'; 
                        }

                        const prodInfo = allProductsCache.find(p => String(p.id) === String(item.productId));
                        const tempType = prodInfo ? prodInfo.tempType : 'chilled'; 

                        const displayCaseCount = (item.caseCount !== undefined) ? item.caseCount : 0;
                        
                        let unitOptions = '';
                        if(prodInfo && prodInfo.unitMap) {
                            Object.keys(prodInfo.unitMap).forEach(unitName => {
                                const unitCode = getUnitCode(unitName);
                                const isSelected = (String(unitCode) === String(item.unit) || unitName === String(item.unit)) ? 'selected' : '';
                                unitOptions += `<option value="${unitCode}" ${isSelected}>${unitName}</option>`;
                            });
                        } else {
                            const unitCode = getUnitCode(item.unit || '');
                            unitOptions = `<option value="${unitCode}" selected>${getUnitName(unitCode) || item.unit || ''}</option>`;
                        }

                        return `
                        <tr data-detail-id="${item.detailId || ''}" 
                            data-order-id="${item.orderId}" 
                            data-awase-id="${item.awaseId || ''}"
                            data-temp-type="${tempType}"
                            data-ship-date="${item.shipDate}" 
                            data-delivery-date="${item.deliveryDate}"
                            data-kg="${item.kg || 0}"
                            data-shipping-qty="${item.shippingQty || 0}"
                            data-order-qty="${item.orderQty || item.quantity}"
                            data-order-unit="${item.orderUnit || getUnitName(item.unit)}"
                            data-billing-qty="${item.quantity}">
                            <td><div class="ship-product-select-container"><select class="form-select form-select-sm ship-product-select" data-init="1" onchange="onShipProductChange(this)"></select></div></td>
                            <td><input type="text" class="form-control form-control-sm ship-standard" value="${item.standard||''}" placeholder="規格"></td>
                            <td><input type="text" class="form-control form-control-sm ship-order-unit" value="${item.orderUnit || getUnitName(item.unit) || ''}" style="width:70px;"></td>
                            <td><input type="number" class="form-control form-control-sm ship-order-qty" step="0.5" value="${item.orderQty || item.quantity}" style="width:70px;" onchange="onOrderQtyChange(this)"></td>
                            <td><input type="number" class="form-control form-control-sm ship-kg" value="${item.kg || 0}" style="width:60px; background-color:#e9ecef;" readonly tabindex="-1"></td>
                            <td><select class="form-select form-select-sm ship-unit" data-prev-unit="${item.unit||''}" onchange="onShipUnitChange(this)">${unitOptions}</select></td>
                            <td><input type="number" class="form-control form-control-sm ship-shipping-qty" value="${item.shippingQty || 0}" style="width:70px;" oninput="this.dataset.manual='1'"></td>
                            <td><input type="date" class="form-control form-control-sm ship-item-sdate" value="${item.shipDate}"></td> 
                            <td><input type="date" class="form-control form-control-sm ship-item-date" value="${item.deliveryDate}"></td> 
                            
                            <td><input type="number" class="form-control form-control-sm ship-price" value="${item.unitPrice}" onchange="recalcShippingRow(this, false)" style="width:70px;"></td>
                            
                            <td><input type="number" class="form-control form-control-sm ship-case" value="${item.caseQty}" style="width:50px;" onchange="recalcShippingRow(this, false)"></td>
                            <td><input type="number" class="form-control form-control-sm ship-gosu" value="${item.gosu||0}" style="width:50px;" readonly tabindex="-1"></td>

        function applyCombinedFilters() {
            const accordions = document.querySelectorAll('.accordion-item');
            accordions.forEach(acc => {
                const status = acc.dataset.status; 
                const rows = acc.querySelectorAll('tbody tr');
                
                let hasVisibleRows = false; 
                let hasActiveDateRows = false; 

                rows.forEach(row => {
                    const rowTemp = row.dataset.tempType;
                    const rowDate = row.dataset.shipDate; 

                    const tempMatch = (currentTempFilter === 'all' || rowTemp === currentTempFilter);
                    
                    if (!tempMatch) {
                        row.style.display = 'none';
                        return; 
                    }

                    row.style.display = ''; 
                    if (rowDate === currentDateFilter) {
                        row.classList.remove('row-dimmed');
                        hasActiveDateRows = true;
                    } else {
                        row.classList.add('row-dimmed');
                    }
                    hasVisibleRows = true;
                });

                const statusMatch = (currentStatusFilter === 'all' || status === currentStatusFilter);
                
                if (statusMatch && hasVisibleRows && hasActiveDateRows) {
                    acc.style.display = '';
                } else {
                    acc.style.display = 'none';
                }
            });
        }

        async function onShipProductChange(select) {
            const productId = $(select).val();
            const tr = select.closest('tr');
            const product = select2Data.find(p => String(p.id) === String(productId));
            
            const isInit = select.dataset.init === "1";
            select.dataset.init = "0"; 
            
            if (product) {
                if (!isInit) {
                    const accordionItem = tr.closest('.accordion-item');
                    const custId = accordionItem ? $(accordionItem).find('.ship-cust-select').val() : null;
                    
                    let applyPrice = product.price;

                    if (custId) {
                        if (!currentCustomerPrices[custId]) {
                            try {
                                currentCustomerPrices[custId] = await callGAS('getCustomerSpecificPrices', custId);
                            } catch (e) {
                                currentCustomerPrices[custId] = {};
                            }
                        }
                        const custPrices = currentCustomerPrices[custId] || {};
                        if (custPrices[productId] !== undefined && custPrices[productId] !== null) {
                            applyPrice = custPrices[productId];
                        }
                    }

                    tr.querySelector('.ship-price').value = applyPrice;
                    tr.querySelector('.ship-case').value = product.caseQty;
                    tr.querySelector('.ship-gosu').value = product.gosu;
                    tr.querySelector('.ship-standard').value = product.standard || '';

                    const orderUnitInput = tr.querySelector('.ship-order-unit');
                    if (orderUnitInput) orderUnitInput.value = product.tradeUnitName || '';
                }

                const unitSelect = tr.querySelector('.ship-unit');
                const currentSelectedUnit = isInit ? unitSelect.value : null;

                if (!isInit) {
                    unitSelect.innerHTML = '';
                    if(product.unitMap && Object.keys(product.unitMap).length > 0) {
                        Object.keys(product.unitMap).forEach(unitName => {
                            const option = document.createElement('option');
                            const unitCode = getUnitCode(unitName);
                            option.value = unitCode;
                            option.textContent = unitName;
                            if(String(unitCode) === String(product.tradeUnitCode)) option.selected = true;
                            unitSelect.appendChild(option);
                        });
                    } else {
                        const option = document.createElement('option');
                        const unitCode = getUnitCode(product.tradeUnitName || product.unit || '');
                        option.value = unitCode;
                        option.textContent = product.tradeUnitName || product.unit || '';
                        option.selected = true;
                        unitSelect.appendChild(option);
                    }
                    unitSelect.setAttribute('data-prev-unit', unitSelect.value);
                }

                tr.dataset.tempType = product.tempType;
                if (product.tempType === 'frozen') {
                    tr.querySelector('.stock-action-area').style.display = 'block';
                    tr.querySelector('.stock-not-frozen').style.display = 'none';
                } else {
                    tr.querySelector('.stock-action-area').style.display = 'none';
                    tr.querySelector('.stock-not-frozen').style.display = 'block';
                }

                recalcShippingRow(select, false);
            }
        }

        // 重量（kg）ベース絶対値変換・受発注計算ロジック
        function recalcShippingRow(input, isQtyInput) {
            const tr = input.closest('tr');
            
            const price = parseFloat(tr.querySelector('.ship-price').value) || 0; 
            
            const orderUnitInput = tr.querySelector('.ship-order-unit');
            const orderUnit = orderUnitInput && orderUnitInput.value
                ? orderUnitInput.value
                : getUnitName(tr.querySelector('.ship-unit').value);
            
            const orderQtyInput = tr.querySelector('.ship-order-qty');
            const orderQty = orderQtyInput ? (parseFloat(orderQtyInput.value) || 0) : (parseFloat(tr.querySelector('.ship-qty').value) || 0);
            
            const productId = $(tr).find('.ship-product-select').val();
            const product = allProductsCache.find(p => String(p.id) === String(productId));
            
            if (!product || !product.unitMap) return;

            const factorOrder = product.unitMap[orderUnit];
            
            if (factorOrder === undefined) {
                console.warn(`Missing Unit Factor: 単位 '${orderUnit}' の換算係数が存在しません。`);
                return; 
            }
            
            const kg = orderQty * factorOrder;
            const billingQty = kg; 
            const amount = billingQty * price;
            
            let shippingQty = 0;
            const factorZaiko = product.unitMap[product.zaikoUnitName];
            if (factorZaiko) {
                shippingQty = round1st(kg / factorZaiko);
            }
            
            let boxQty = null;
            const factorBox = product.unitMap['単箱'] || product.unitMap['c/s'] || product.unitMap['箱'];
            if (factorBox) {
                boxQty = round1st(kg / factorBox);
            }

            tr.querySelector('.ship-total').textContent = `¥${Math.floor(amount).toLocaleString()}`;
            
            const caseCountInput = tr.querySelector('.ship-case-count');
            if (boxQty !== null) {
                caseCountInput.value = boxQty;
            } else {
                caseCountInput.value = ''; 
            }
            
            const kgInput = tr.querySelector('.ship-kg');
            if (kgInput) kgInput.value = round1st(kg);

            const shippingQtyInput = tr.querySelector('.ship-shipping-qty');
            if (shippingQtyInput && !shippingQtyInput.dataset.manual) {
                shippingQtyInput.value = shippingQty;
            }

            const qtyInput = tr.querySelector('.ship-qty');
            if (qtyInput && isQtyInput) {
                qtyInput.value = billingQty;
            }

            tr.dataset.kg = kg;
            tr.dataset.billingQty = billingQty;
            tr.dataset.shippingQty = shippingQty;
            tr.dataset.orderQty = orderQty;
            tr.dataset.orderUnit = orderUnit;

            const accordion = tr.closest('.accordion-item');
            let groupTotal = 0;
            accordion.querySelectorAll('tbody tr').forEach(row => {
                const rowPrice = parseFloat(row.querySelector('.ship-price').value) || 0;
                const rowBillingQty = parseFloat(row.dataset.billingQty) || 0;
                groupTotal += rowPrice * rowBillingQty;
            });
            accordion.querySelector('.ship-group-total').textContent = `¥${Math.floor(groupTotal).toLocaleString()}`;
        }

            const targetRows = [];

            checks.forEach(chk => {

        function stringToColor(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) hash = str.charCodeAt(i) + ((hash << 5) - hash);
            let color = '#';
            for (let i = 0; i < 3; i++) {
                let value = (hash >> (i * 8)) & 0xFF;
                value = Math.floor(value * 0.8);
                color += ('00' + value.toString(16)).substr(-2);
            }
            return color;
        }

        // ★変更：削除後、画面全体をリロードせずに見た目だけ消す
        async function deleteOrder(detailId, orderId, btn) {
            const result = await Swal.fire({
                title: '削除しますか？',
                text: '本当にこの明細を削除しますか？',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: 'はい、削除します',
                cancelButtonText: 'キャンセル'
            });
            if(!result.isConfirmed) return;

            showLoading(true);
            try { 
                await callGAS('deleteOrder', detailId, orderId); 
                btn.closest('tr').remove();
                showToast('明細を削除しました', 'success');
            } catch(e) { 
                Swal.fire('エラー', e.message, 'error'); 
            } finally { 
                showLoading(false); 
            }
        }

        // ★変更：保存後、画面全体をリロードせずにバッジだけ更新する
        async function confirmOrder(btn, customerId, date) {
            const itemEl = btn.closest('.accordion-item');
            const newCustomerId = $(itemEl).find('.ship-cust-select').val();
            const newCustomerName = $(itemEl).find('.ship-cust-select option:selected').text();
            const newDeliveryDestination = $(itemEl).find('.ship-delivery-select').val(); 
            const newCarrierName = $(itemEl).find('.ship-carrier-select').val(); 

            const items = [];
            let validationError = false;
            
            itemEl.querySelectorAll('tbody tr').forEach(tr => {
                const productId = $(tr).find('.ship-product-select').val();
                if (!productId) validationError = true; 

                const orderQtyInput = tr.querySelector('.ship-order-qty');
                const orderUnitInput = tr.querySelector('.ship-order-unit');
                const kgInput = tr.querySelector('.ship-kg');
                const shippingQtyInput = tr.querySelector('.ship-shipping-qty');
                const qtyInput = tr.querySelector('.ship-qty');

                items.push({
                    orderId: tr.dataset.orderId,
                    detailId: tr.dataset.detailId, 
                    productId: productId,
                    standard: tr.querySelector('.ship-standard').value, 
                    unit: tr.querySelector('.ship-unit').value, 
                    shipDate: tr.querySelector('.ship-item-sdate').value, 
                    deliveryDate: tr.querySelector('.ship-item-date').value, 
                    price: parseInt(tr.querySelector('.ship-price').value)||0,
                    
                    orderQty: orderQtyInput ? (parseFloat(orderQtyInput.value) || 0) : (parseFloat(tr.dataset.orderQty) || parseFloat(tr.querySelector('.ship-qty').value) || 0),
                    orderUnit: orderUnitInput ? orderUnitInput.value : (tr.dataset.orderUnit || tr.querySelector('.ship-unit').value),
                    kg: kgInput ? (parseFloat(kgInput.value) || 0) : (parseFloat(tr.dataset.kg) || 0),
                    shippingQty: shippingQtyInput ? (parseFloat(shippingQtyInput.value) || 0) : (parseFloat(tr.dataset.shippingQty) || 0),
                    caseCount: parseFloat(tr.querySelector('.ship-case-count').value) || 0,
                    quantity: qtyInput ? (parseFloat(qtyInput.value) || 0) : (parseFloat(tr.dataset.billingQty) || 0), 

                    awaseId: tr.dataset.awaseId || '', 
                    isAwase: (!!tr.dataset.awaseId), 
                    newRemarks: tr.querySelector('.ship-rem').value,
                    warehouseCode: tr.querySelector('.ship-warehouse-code') ? tr.querySelector('.ship-warehouse-code').value : '',
                    lotNumber: tr.querySelector('.ship-lot-number') ? tr.querySelector('.ship-lot-number').value : ''
                });
            });
            
            if (validationError) return Swal.fire('注意', '商品が選択されていない行があります。', 'warning');
            
            const result = await Swal.fire({
                title: '確定しますか？',
                text: '内容を更新・確定しますか？',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'はい',
                cancelButtonText: 'キャンセル'
            });
            if(!result.isConfirmed) return;

            showLoading(true);
            try { 
                await callGAS('updateAndConfirmOrder', { 
                    customerId, orderDate: date, 
                    newCustomerId, newCustomerName, newDeliveryDestination, newCarrierName,
                    items 
                }); 
                
                showToast('保存が完了しました', 'success');
                
                const headerBadge = itemEl.querySelector('.accordion-header .badge.bg-warning');
                if (headerBadge) {
                    headerBadge.className = 'badge bg-success';
                    headerBadge.textContent = '確定済み';
                }
                itemEl.dataset.status = 'confirmed';
                
            } catch(e) { Swal.fire('エラー', e.message, 'error'); } finally { showLoading(false); }
        }

        async function exportDailyCsv() {
            const targetDate = document.getElementById('export-target-date').value;
            if (!targetDate) return Swal.fire('注意', '日付を選択してください', 'warning');

            showLoading(true);
            try {
                const csv = await callGAS('exportDailyCsv', targetDate);
                if (!csv) {
                    Swal.fire('情報', '対象日のデータがありません', 'info');
                } else {
                    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: 'text/csv' });
                    const a = document.createElement('a');
                    a.href = URL.createObjectURL(blob);
                    a.download = `売上データ_${targetDate.replace(/-/g,'')}.csv`;
                    a.click();
                }
            } catch (err) {
                Swal.fire('エラー', err.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        function toggleBatchAction() {
            const checkedCount = document.querySelectorAll('.print-select:checked').length;
            const actionArea = document.getElementById('batch-action-area');
            document.getElementById('selected-count').textContent = checkedCount;
            
            if (checkedCount > 0) {
                actionArea.style.display = 'flex';
            } else {
                actionArea.style.display = 'none';
            }
        }

        async function generateBatchPdfs() {
            const targets = [];
            document.querySelectorAll('.print-select:checked').forEach(cb => {
                targets.push({ customerId: cb.dataset.customerId, orderDate: cb.dataset.orderDate });
            });
            if (targets.length === 0) return;
            
            const result = await Swal.fire({
                title: '帳票出力',
                text: `${targets.length}件の帳票を出力しますか？`,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: '出力する',
                cancelButtonText: 'キャンセル'
            });
            if(!result.isConfirmed) return;

            showLoading(true);
            try {
                const res = await callGAS('generateBatchPdfs', targets);
                
                const byteCharacters = atob(res.base64);
                const byteNumbers = new Array(byteCharacters.length);
                for (let i = 0; i < byteCharacters.length; i++) {
                    byteNumbers[i] = byteCharacters.charCodeAt(i);
                }
                const byteArray = new Uint8Array(byteNumbers);
                const blob = new Blob([byteArray], {type: "application/pdf"});
                
                const link = document.createElement('a');
                link.href = window.URL.createObjectURL(blob);
                link.download = res.filename;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                Swal.fire('完了', res.message, 'success');
                loadShippingData(); 
            } catch(e) { Swal.fire('出力エラー', e.message, 'error'); } finally { showLoading(false); }
        }

        function importCsv() {
            const fileInput = document.getElementById('import-file');
            const file = fileInput.files[0];
            if (!file) return Swal.fire('注意', 'ファイルを選択してください', 'warning');
            
            Swal.fire({
                title: '確認',
                text: '納入先台帳を更新します。よろしいですか？\n（既存のコードは上書きされます）',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonText: '実行',
                cancelButtonText: 'キャンセル'
            }).then((result) => {
                if(result.isConfirmed) {
                    showLoading(true);
                    const reader = new FileReader();
                    reader.readAsText(file); 
                    reader.onload = async function(e) {
                        const csvContent = e.target.result;
                        try {
                            const res = await callGAS('importDeliveryMasterCsv', csvContent);
                            Swal.fire('完了', res.message, 'success');
                            fileInput.value = ''; 
                        } catch(err) { Swal.fire('エラー', 'エラーが発生しました: ' + err.message, 'error'); } finally { showLoading(false); }
                    };
                    reader.onerror = function() { Swal.fire('エラー', 'ファイルの読み込みに失敗しました', 'error'); showLoading(false); };
                }
            });
        }

        // --- 在庫引当モーダル用ロジック ---
        let currentStockTargetRow = null;
        let stockModalInstance = null;

        async function openStockModal(btn) {
            currentStockTargetRow = btn.closest('tr');
            const productId = $(currentStockTargetRow).find('.ship-product-select').val();
            
            if (!productId) {
                return Swal.fire('注意', '先に商品を選択してください。', 'warning');
            }

            showLoading(true);
            try {
                const stocks = await callGAS('getAvailableStocks', productId);
                const tbody = document.getElementById('stock-modal-tbody');
                
                if (stocks.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-center text-muted">該当商品の在庫が見つかりません</td></tr>';
                } else {
                    tbody.innerHTML = stocks.map(s => `
                        <tr>
                            <td>${s.warehouseName} <span class="badge bg-secondary ms-1">${s.warehouseCode}</span></td>
                            <td class="fw-bold text-primary">${s.lotNumber}</td>
                            <td>${s.expirationDate || '-'}</td>
                            <td class="text-end fw-bold">${s.stockQty}</td>
                            <td>${s.unit}</td>
                            <td>
                                <button class="btn btn-sm btn-primary" onclick="selectStockItem('${s.warehouseCode}', '${s.lotNumber}')">
                                    選択
                                </button>
                            </td>
                        </tr>
                    `).join('');
                }
                
                if (!stockModalInstance) {
                    stockModalInstance = new bootstrap.Modal(document.getElementById('stockModal'));
                }
                stockModalInstance.show();

            } catch(e) {
                Swal.fire('エラー', '在庫の取得に失敗しました: ' + e.message, 'error');
            } finally {
                showLoading(false);
            }
        }

        function selectStockItem(warehouseCode, lotNumber) {
            if (currentStockTargetRow) {
                currentStockTargetRow.querySelector('.ship-warehouse-code').value = warehouseCode;
                currentStockTargetRow.querySelector('.ship-lot-number').value = lotNumber;
                currentStockTargetRow.querySelector('.stock-info-text').innerHTML = `倉: ${warehouseCode}<br>ﾛｯﾄ: ${lotNumber}`;
                
                stockModalInstance.hide();
                showToast(`ロット番号 ${lotNumber} を引き当てました`, 'info');
            }
        }
    </script>
</body>
